version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: syncspace-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: syncspace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: syncspace-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/syncspace?schema=public
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - postgres
      
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: syncspace-frontend
    restart: always
    ports:
    - "3000:3000"
    environment:
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:
