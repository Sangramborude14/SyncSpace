name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: syncspace
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    # Backend Build Checks
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Backend Build Verification
      run: |
        cd backend
        npx prisma generate
        npm run build

    # Frontend Build Checks
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Frontend Build Verification
      run: |
        cd frontend
        npm run build

    # Docker Build Verification
    - name: Verify Backend Docker Build
      run: |
        docker build -t syncspace-backend:latest ./backend

    - name: Verify Frontend Docker Build
      run: |
        docker build -t syncspace-frontend:latest ./frontend
